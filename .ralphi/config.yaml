# ralphi configuration
# Auto-generated — edit as needed

project:
  name: "chronicle"
  language: "Rust"

commands:
  test: "cargo test"
  lint: "cargo clippy -- -D warnings"
  build: "cargo build"
  format: "cargo fmt --check"
  license: "cargo deny check"

rules:
  - "use thiserror for library error types, anyhow for application errors"
  - "follow Rust API Guidelines — clippy with pedantic lints"
  - "use proptest for property-based tests (merge commutativity, canon round-trips)"
  - "unit tests in mod tests at bottom of source files; integration tests in tests/"
  - "use Conventional Commits (enforced by commit-msg hook)"
  - "run cargo fmt before committing"
  - "new dependencies must pass cargo deny check (license allowlist in deny.toml)"
  - "prefer std over third-party crates for simple tasks"

boundaries:
  never_touch:
    - "*.lock"
    - ".env*"
    - "deny.toml"

engine: "pi"
max_retries: 3
