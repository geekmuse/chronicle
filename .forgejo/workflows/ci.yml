name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI (Linux)
    # Use 'self-hosted' if you have registered act runners; otherwise use
    # a Forgejo-hosted runner label such as 'ubuntu-latest' if available.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo-deny
        run: cargo deny check

  # Uncomment and configure if you have a self-hosted macOS runner registered
  # with Forgejo (label: macos or self-hosted,macos).
  #
  # ci-macos:
  #   name: CI (macOS)
