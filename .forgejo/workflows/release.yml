  #       with:
  #         targets: ${{ matrix.target }}
  #     - run: cargo build --release --target ${{ matrix.target }}
  #     - name: Package binary
  #       run: |
  #         TAG=${GITHUB_REF_NAME}
  #         BINARY=target/${{ matrix.target }}/release/chronicle
  #         ARCHIVE=chronicle-${TAG}-${{ matrix.target }}.tar.gz
  #         tar -czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
  #         echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: chronicle-${{ matrix.target }}
  #         path: ${{ env.ARCHIVE }}

  release:
    name: Create Forgejo Release
    needs: [build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Extract changelog entry
        id: changelog
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/^## \[$TAG\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: forgejo/release-action@v1
        with:
          direction: upload
          tag: ${{ github.ref_name }}
          release-notes: ${{ steps.changelog.outputs.notes }}
          files: artifacts/*.tar.gz
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
